<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleStorage — Cash Item Tracker</title>
<meta name="description" content="Track your MapleStory cash shop items across all class storages">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <div class="logo-icon">🍁</div>
    <div class="logo-text-wrap">
      <div class="logo-text">MapleStorage</div>
      <div class="logo-sub">Cash Item Tracker</div>
    </div>
    <div class="stats-bar">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">Items</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">Add Items</button>
    <button class="tab" onclick="switchTab('storage')">My Storage</button>
    <button class="tab" onclick="switchTab('sim')">Sim</button>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="db-search" placeholder="Search cash items by name or ID..." oninput="onSearchInput()" autocomplete="off">
        <div class="spinner" id="spinner"></div>
      </div>
      <select class="filter-select" id="db-category-filter" onchange="onSearchInput()">
        <option value="">All categories</option>
        <option value="Hat">Hat</option>
        <option value="Face Decoration">Face Decoration</option>
        <option value="Eye Decoration">Eye Decoration</option>
        <option value="Hair">Hair</option>
        <option value="Overall">Overall</option>
        <option value="Top">Top</option>
        <option value="Bottom">Bottom</option>
        <option value="Cape">Cape</option>
        <option value="Gloves">Gloves</option>
        <option value="Shoes">Shoes</option>
        <option value="Earrings">Earrings</option>
        <option value="Ring">Ring</option>
        <option value="Pendant">Pendant</option>
        <option value="Weapon">Weapon</option>
        <option value="Secondary Weapon">Secondary Weapon</option>
        <option value="Pet">Pet</option>
        <option value="Pet Equip">Pet Equip</option>
        <option value="Chair">Chair</option>
        <option value="Coupon">Coupon</option>
        <option value="Service">Service</option>
        <option value="Convenience">Convenience</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div id="api-error" class="api-error" style="display:none;"></div>
    <div id="db-result-count" class="result-count"></div>
    <div id="db-results" class="db-results" style="display:none;"></div>
    <div id="db-empty" class="db-empty">
      <div class="db-empty-icon">🍁</div>
      <div>Type above to search the live MapleStory item database</div>
      <div class="db-empty-sub">Powered by maplestory.io · GMS data</div>
    </div>
  </div>

  <!-- STORAGE TAB -->
  <div id="tab-storage" style="display:none;">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="storage-search" placeholder="Search your storage by name or ID..." oninput="renderStorage()" autocomplete="off">
      </div>
      <select class="filter-select" id="storage-class-filter" onchange="renderStorage()">
        <option value="">All storages</option>
      </select>
    </div>
    <div id="storage-list"></div>
  </div>

  <!-- SIM TAB -->
  <div id="tab-sim" style="display:none;">
    <div class="sim-layout">

      <!-- Left: character preview -->
      <div class="sim-preview-col">
        <div class="sim-character-card">
          <div class="sim-character-wrap">
            <img id="sim-character-img" src="" alt="Character preview" style="display:none;">
            <div id="sim-character-placeholder" class="sim-placeholder">
              <div class="sim-placeholder-icon">🧍</div>
              <div>Equip an item to<br>preview your character</div>
            </div>
          </div>
          <div class="sim-controls">
            <div class="sim-control-group">
              <label class="sim-label">Skin</label>
              <select class="sim-select" id="sim-skin" onchange="updateCharacter()">
                <option value="2000">Light</option>
                <option value="2004">Tanned</option>
                <option value="2010">Dark</option>
                <option value="2001">Pale</option>
              </select>
            </div>
            <div class="sim-control-group">
              <label class="sim-label">Stance</label>
              <select class="sim-select" id="sim-stance" onchange="updateCharacter()">
                <option value="stand1">Stand</option>
                <option value="walk1">Walk</option>
              </select>
            </div>
            <div class="sim-control-group">
              <label class="sim-label">Animated</label>
              <input type="checkbox" id="sim-animated" class="sim-checkbox" onchange="updateCharacter()" checked>
            </div>
          </div>
          <button class="sim-clear-btn" onclick="clearSim()">Clear All Slots</button>
        </div>
      </div>

      <!-- Right: equipment slots -->
      <div class="sim-slots-col">
        <div class="sim-slots-section-label">Cash Equip Slots</div>
        <div class="sim-search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="sim-search" placeholder="Search items to equip..." oninput="onSimSearchInput()" autocomplete="off">
          <div class="spinner" id="sim-spinner"></div>
        </div>
        <div id="sim-search-results" class="sim-search-results" style="display:none;"></div>

        <div class="sim-slots-section-label" style="margin-top:1.25rem;">Equipped</div>
        <div class="sim-slots-grid" id="sim-slots-grid"></div>
      </div>

    </div>
  </div>

</div>

<!-- ASSIGN MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Add to Storage</h3>
    <div class="modal-item-preview" id="modal-item-preview"></div>

    <div class="modal-section-label">Quantity</div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <input class="qty-input" type="number" id="qty-input" value="1" min="1" max="999" oninput="clampQty()">
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>

    <div class="modal-section-label" style="margin-top:1.25rem;">Class Storage</div>
    <div class="class-grid" id="class-grid"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmAdd()" disabled>Add to Storage</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
