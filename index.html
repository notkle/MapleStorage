<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleStorage — Cash Item Tracker</title>
<meta name="description" content="Track your MapleStory cash shop items across all class storages">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1e2530;
  --surface3: #252d3a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --amber: #f0a23c;
  --amber-dim: #8a5c1a;
  --amber-glow: rgba(240,162,60,0.15);
  --text: #e6edf3;
  --text-muted: #7d8590;
  --text-dim: #4a5568;
  --red: #e05252;
  --green: #3fb950;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app {
  max-width: 920px;
  margin: 0 auto;
  padding: 1.5rem 1rem 5rem;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
}
.logo-icon {
  width: 42px; height: 42px;
  background: var(--amber-glow);
  border: 1px solid var(--amber-dim);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.logo-text { font-family: 'Cinzel', serif; font-size: 1.35rem; color: var(--amber); letter-spacing: 0.04em; }
.logo-sub { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
.stats-bar { margin-left: auto; text-align: right; }
.stat-num { font-size: 1.2rem; font-weight: 600; color: var(--amber); }
.stat-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

/* TABS */
.tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.tab {
  padding: 0.5rem 1.2rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
}
.tab:hover { border-color: var(--border2); color: var(--text); }
.tab.active { background: var(--amber-glow); border-color: var(--amber-dim); color: var(--amber); }

/* SEARCH */
.search-row { display: flex; gap: 0.75rem; margin-bottom: 0.5rem; }
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%;
  padding: 0.65rem 2.5rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--amber-dim); }
.search-wrap input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 14px; pointer-events: none;
}
.spinner {
  position: absolute; right: 0.85rem; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  border: 2px solid var(--border2);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

.filter-select {
  padding: 0.65rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
  min-width: 165px;
}
.filter-select option { background: var(--surface2); }

/* RESULT META */
.result-count { font-size: 0.75rem; color: var(--text-muted); padding-bottom: 0.5rem; }
.api-error { font-size: 0.8rem; color: var(--red); padding-bottom: 0.5rem; }

/* DB RESULTS */
.db-results {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.db-header {
  padding: 0.6rem 1rem;
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.api-badge {
  font-size: 0.65rem; padding: 2px 7px; border-radius: 4px;
  background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.25); color: var(--green);
}
.db-item {
  display: flex; align-items: center; gap: 0.85rem;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.db-item:last-child { border-bottom: none; }
.db-item:hover { background: var(--surface2); }

/* ITEM ICON */
.item-icon-wrap {
  width: 40px; height: 40px;
  background: var(--surface3);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--border);
  overflow: hidden;
}
.item-icon-wrap img { width: 32px; height: 32px; object-fit: contain; image-rendering: pixelated; }
.item-icon-wrap .fallback { font-size: 18px; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-id { font-size: 0.72rem; color: var(--text-muted); font-family: monospace; }

/* ADD BUTTON */
.add-btn {
  padding: 0.35rem 0.85rem;
  background: var(--amber-glow);
  border: 1px solid var(--amber-dim);
  border-radius: 7px;
  color: var(--amber);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.add-btn:hover { background: rgba(240,162,60,0.25); }
.add-btn.owned { background: rgba(63,185,80,0.12); border-color: rgba(63,185,80,0.3); color: var(--green); cursor: default; }

/* EMPTY STATE */
.db-empty {
  text-align: center; padding: 2.5rem 1rem;
  color: var(--text-muted); font-size: 0.88rem;
  line-height: 1.8;
}
.db-empty-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5; }
.db-empty-sub { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.25rem; }

/* CLASS BADGE */
.class-badge-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
.class-badge {
  padding: 0.25rem 0.65rem; border-radius: 6px;
  font-size: 0.7rem; font-weight: 600;
  white-space: nowrap; letter-spacing: 0.03em;
  cursor: default; border: 1px solid transparent;
  user-select: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.class-popover {
  display: none;
  position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 0.65rem 0.85rem;
  z-index: 50; min-width: 160px; max-width: 220px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); pointer-events: none;
}
.class-popover::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: var(--border2);
}
.class-badge-wrap:hover .class-popover { display: block; }
.popover-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.4rem; }
.popover-chars { display: flex; flex-wrap: wrap; gap: 4px; }
.popover-char { font-size: 0.72rem; padding: 2px 7px; border-radius: 4px; background: var(--surface3); color: var(--text-muted); white-space: nowrap; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 1.75rem;
  width: 480px; max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 { font-family: 'Cinzel', serif; color: var(--amber); font-size: 1rem; margin-bottom: 1rem; }
.modal-item-preview {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem; background: var(--surface2); border-radius: 10px;
  margin-bottom: 1.25rem;
}
.modal-item-preview .item-name { font-size: 0.9rem; font-weight: 500; }
.modal-item-preview .item-id { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; }
.modal-section-label {
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted);
  margin-bottom: 0.6rem;
}

/* QUANTITY */
.qty-row {
  display: flex; align-items: center; gap: 0.5rem;
  width: fit-content;
}
.qty-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.qty-btn:hover { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }
.qty-input {
  width: 64px;
  padding: 0.4rem 0.5rem;
  text-align: center;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  outline: none;
}
.qty-input:focus { border-color: var(--amber-dim); }
.qty-input::-webkit-inner-spin-button,
.qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* CLASS GRID IN MODAL */
.class-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.25rem; }
.class-btn {
  padding: 0.55rem 0.4rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.3;
  position: relative;
  overflow: visible;
}
.class-btn:hover .btn-popover { display: block; }
.btn-popover {
  display: none;
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 0.5rem 0.7rem;
  z-index: 200; min-width: 150px; max-width: 200px;
  pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.5); text-align: left;
}
.btn-popover::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: var(--border2);
}
.btn-popover-title { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.35rem; }
.btn-popover-chars { display: flex; flex-wrap: wrap; gap: 3px; }
.btn-popover-char { font-size: 0.68rem; padding: 2px 6px; border-radius: 4px; background: var(--surface3); color: var(--text-muted); white-space: nowrap; }

.modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
.btn-cancel {
  padding: 0.5rem 1.1rem; background: transparent;
  border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text-muted); font-family: 'Outfit', sans-serif;
  font-size: 0.85rem; cursor: pointer;
}
.btn-confirm {
  padding: 0.5rem 1.25rem;
  background: var(--amber-glow); border: 1px solid var(--amber-dim);
  border-radius: 8px; color: var(--amber);
  font-family: 'Outfit', sans-serif; font-size: 0.85rem;
  font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.btn-confirm:hover { background: rgba(240,162,60,0.25); }
.btn-confirm:disabled { opacity: 0.4; cursor: default; }

/* STORAGE — CATEGORY GROUPS */
.storage-category-group { margin-bottom: 1.5rem; }
.storage-category-header {
  display: flex; align-items: center; gap: 0.6rem;
  margin-bottom: 0.6rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}
.storage-category-name {
  font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted);
  font-weight: 500;
}
.storage-category-count {
  font-size: 0.68rem; padding: 1px 7px;
  border-radius: 10px; background: var(--surface2);
  color: var(--text-dim); border: 1px solid var(--border);
}
.storage-items-list { display: flex; flex-direction: column; gap: 0.45rem; }
.storage-item {
  display: flex; align-items: center; gap: 0.85rem;
  padding: 0.7rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: border-color 0.15s;
}
.storage-item:hover { border-color: var(--border2); }
.item-qty-badge {
  font-size: 0.72rem; font-weight: 600;
  padding: 2px 8px; border-radius: 5px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text-muted); white-space: nowrap; flex-shrink: 0;
  font-family: monospace;
}
.item-qty-badge.multi { color: var(--amber); border-color: var(--amber-dim); background: var(--amber-glow); }
.remove-btn {
  margin-left: auto;
  width: 28px; height: 28px;
  border-radius: 6px; border: 1px solid transparent;
  background: transparent; color: var(--text-dim);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.remove-btn:hover { border-color: rgba(224,82,82,0.3); color: var(--red); background: rgba(224,82,82,0.1); }

/* EMPTY */
.empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty p { font-size: 0.88rem; }

/* TOAST */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  padding: 0.7rem 1.1rem;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; font-size: 0.85rem; color: var(--text);
  z-index: 200;
  transform: translateY(100px); opacity: 0;
  transition: all 0.25s; max-width: 300px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(63,185,80,0.4); }
.toast.error { border-color: rgba(224,82,82,0.4); }

/* ─── SIM TAB ─────────────────────────────────────────────────────────────── */
.sim-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 1.25rem;
  align-items: start;
}
@media (max-width: 600px) {
  .sim-layout { grid-template-columns: 1fr; }
}

/* Character preview card */
.sim-character-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.85rem;
  position: sticky;
  top: 1rem;
}
.sim-character-wrap {
  width: 180px; height: 220px;
  background: var(--surface2);
  border-radius: 10px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.sim-character-wrap img {
  image-rendering: pixelated;
  max-width: 100%; max-height: 100%;
  object-fit: contain;
}
.sim-placeholder {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.8rem;
  line-height: 1.6;
}
.sim-placeholder-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }

.sim-controls {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.sim-control-group {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}
.sim-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  flex-shrink: 0;
}
.sim-select {
  flex: 1;
  padding: 0.3rem 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  outline: none;
  cursor: pointer;
}
.sim-select option { background: var(--surface2); }
.sim-checkbox {
  width: 16px; height: 16px;
  accent-color: var(--amber);
  cursor: pointer;
}
.sim-clear-btn {
  width: 100%;
  padding: 0.45rem;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text-muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}
.sim-clear-btn:hover { border-color: rgba(224,82,82,0.4); color: var(--red); }

/* Right column */
.sim-slots-col { display: flex; flex-direction: column; gap: 0.6rem; }
.sim-slots-section-label {
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted);
}
.sim-search-wrap {
  position: relative;
}
.sim-search-wrap input {
  width: 100%;
  padding: 0.6rem 2.5rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.15s;
}
.sim-search-wrap input:focus { border-color: var(--amber-dim); }
.sim-search-wrap input::placeholder { color: var(--text-dim); }

/* Sim search results */
.sim-search-results {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  max-height: 260px;
  overflow-y: auto;
}
.sim-result-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.6rem 0.85rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.sim-result-item:last-child { border-bottom: none; }
.sim-result-item:hover { background: var(--surface2); }
.sim-result-name { font-size: 0.85rem; font-weight: 500; }
.sim-result-meta { font-size: 0.7rem; color: var(--text-muted); font-family: monospace; }
.sim-equip-btn {
  margin-left: auto;
  padding: 0.28rem 0.7rem;
  background: var(--amber-glow);
  border: 1px solid var(--amber-dim);
  border-radius: 6px;
  color: var(--amber);
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.sim-equip-btn:hover { background: rgba(240,162,60,0.25); }

/* Equipped slots grid */
.sim-slots-grid {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.sim-slot {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.55rem 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  transition: border-color 0.15s;
}
.sim-slot.has-item { border-color: var(--border2); }
.sim-slot-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  width: 90px;
  flex-shrink: 0;
}
.sim-slot-item {
  display: flex; align-items: center; gap: 0.6rem;
  flex: 1; min-width: 0;
}
.sim-slot-name {
  font-size: 0.82rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.sim-slot-empty { font-size: 0.78rem; color: var(--text-dim); font-style: italic; }
.sim-unequip-btn {
  width: 24px; height: 24px;
  border-radius: 5px; border: 1px solid transparent;
  background: transparent; color: var(--text-dim);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.sim-unequip-btn:hover { border-color: rgba(224,82,82,0.3); color: var(--red); background: rgba(224,82,82,0.1); }
.sim-loading-overlay {
  position: absolute; inset: 0;
  background: rgba(13,17,23,0.6);
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
}

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-icon">🍁</div>
    <div class="logo-text-wrap">
      <div class="logo-text">MapleStorage</div>
      <div class="logo-sub">Cash Item Tracker</div>
    </div>

      <div class="stat-num" id="total-count">0</div>

    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">Add Items</button>
    <button class="tab" onclick="switchTab('storage')">My Storage</button>

  </div>

  <!-- ADD TAB -->
  <div id="tab-add">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="db-search" placeholder="Search cash items by name (e.g. hat, pet, chair)..." oninput="onSearchInput()" autocomplete="off">
        <div class="spinner" id="spinner"></div>
      </div>
    </div>
    <div id="api-error" class="api-error" style="display:none;"></div>
    <div id="db-result-count" class="result-count"></div>
    <div id="db-results" class="db-results" style="display:none;"></div>
    <div id="db-empty" class="db-empty">
      <div class="db-empty-icon">🍁</div>
      <div>Type above to search the live MapleStory item database</div>
      <div class="db-empty-sub">Powered by maplestory.io · GMS data</div>
    </div>
  </div>

  <!-- STORAGE TAB -->
  <div id="tab-storage" style="display:none;">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="storage-search" placeholder="Search your storage by name or ID..." oninput="renderStorage()" autocomplete="off">
      </div>
      <select class="filter-select" id="storage-class-filter" onchange="renderStorage()">
        <option value="">All storages</option>

    </div>
    <div id="storage-list"></div>
  </div>

  <!-- SIM TAB -->
  <div id="tab-sim" style="display:none;">
    <div class="sim-layout">

      <!-- Left: character preview -->
      <div class="sim-preview-col">
        <div class="sim-character-card">
          <div class="sim-character-wrap">
            <img id="sim-character-img" src="" alt="Character preview" style="display:none;">
            <div id="sim-character-placeholder" class="sim-placeholder">
              <div class="sim-placeholder-icon">🧍</div>
              <div>Equip an item to<br>preview your character</div>
            </div>
          </div>
          <div class="sim-controls">
            <div class="sim-control-group">
              <label class="sim-label">Skin</label>
              <select class="sim-select" id="sim-skin" onchange="updateCharacter()">
                <option value="2000">Light</option>
                <option value="2004">Tanned</option>
                <option value="2010">Dark</option>
                <option value="2001">Pale</option>
              </select>
            </div>
            <div class="sim-control-group">
              <label class="sim-label">Stance</label>
              <select class="sim-select" id="sim-stance" onchange="updateCharacter()">
                <option value="stand1">Stand</option>
                <option value="walk1">Walk</option>
              </select>

            <div class="sim-control-group">
              <label class="sim-label">Animated</label>
              <input type="checkbox" id="sim-animated" class="sim-checkbox" onchange="updateCharacter()" checked>
            </div>
          </div>
          <button class="sim-clear-btn" onclick="clearSim()">Clear All Slots</button>
        </div>
      </div>

      <!-- Right: equipment slots -->
      <div class="sim-slots-col">
        <div class="sim-slots-section-label">Cash Equip Slots</div>
        <div class="sim-search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="sim-search" placeholder="Search items to equip..." oninput="onSimSearchInput()" autocomplete="off">
          <div class="spinner" id="sim-spinner"></div>
        </div>
        <div id="sim-search-results" class="sim-search-results" style="display:none;"></div>

        <div class="sim-slots-section-label" style="margin-top:1.25rem;">Equipped</div>
        <div class="sim-slots-grid" id="sim-slots-grid"></div>

    </div>
  </div>

</div>

<!-- ASSIGN MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Add to Storage</h3>
    <div class="modal-item-preview" id="modal-item-preview"></div>

    <div class="modal-section-label">Quantity</div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <input class="qty-input" type="number" id="qty-input" value="1" min="1" max="999" oninput="clampQty()">
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>

    <div class="modal-section-label" style="margin-top:1.25rem;">Class Storage</div>
    <div class="class-grid" id="class-grid"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmAdd()" disabled>Add to Storage</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CLASS DEFINITIONS ──────────────────────────────────────────────────────
const CLASSES = [
  { id: 'explorer',    name: 'Explorers',      color: '#5b9bd5', bg: 'rgba(91,155,213,0.15)',   chars: ['Paladin','Dark Knight','Hero','Ice/Lightning Mage','Fire/Poison Mage','Bishop','Marksman','Bowmaster','Pathfinder','Night Lord','Shadower','Dual Blade','Cannoneer','Buccaneer','Corsair'] },
  { id: 'cygnus',      name: 'Cygnus Knights',  color: '#e8834a', bg: 'rgba(232,131,74,0.15)',   chars: ['Dawn Warrior','Blaze Wizard','Wind Archer','Night Walker','Thunder Breaker','Mihile'] },
  { id: 'heroes',      name: 'Heroes',          color: '#00c8c8', bg: 'rgba(0,200,200,0.15)',    chars: ['Aran','Evan','Luminous','Mercedes','Phantom','Shade'] },
  { id: 'resistance',  name: 'Resistance',      color: '#4ae87a', bg: 'rgba(74,232,122,0.15)',   chars: ['Blaster','Demon Slayer','Demon Avenger','Battle Mage','Wild Hunter','Xenon','Mechanic'] },
  { id: 'nova',        name: 'Nova',            color: '#c8c8c8', bg: 'rgba(200,200,200,0.12)',  chars: ['Kaiser','Kain','Cadena','Angelic Buster'] },
  { id: 'sengoku',     name: 'Sengoku',         color: '#e84ac7', bg: 'rgba(232,74,199,0.15)',   chars: ['Hayato','Kanna'] },
  { id: 'flora',       name: 'Flora',           color: '#e05252', bg: 'rgba(224,82,82,0.15)',    chars: ['Adele','Illium','Khali','Ark'] },
  { id: 'anima',       name: 'Anima',           color: '#00c8a0', bg: 'rgba(0,200,160,0.15)',    chars: ['Ren','Lara','Hoyoung'] },
  { id: 'jianghu',     name: 'Jianghu',         color: '#c8a87a', bg: 'rgba(200,168,122,0.15)',  chars: ['Lynn','Mo Xuan'] },
  { id: 'shine',       name: 'Shine',           color: '#9b7fe8', bg: 'rgba(155,127,232,0.15)',  chars: ['Sia Astelle'] },
  { id: 'friendstory', name: 'FriendStory',     color: '#f090b0', bg: 'rgba(240,144,176,0.15)', chars: ['Kinesis'] },
  { id: 'childofgod',  name: 'Child of God',    color: '#e8c84a', bg: 'rgba(232,200,74,0.15)',   chars: ['Zero'] },
];

// Category display order and labels
const CATEGORY_ORDER = [
  'Eye Decoration',
  'Face Decoration',
  'Hair',
  'Overall',
  'Top',
  'Bottom',
  'Cape',
  'Gloves',
  'Shoes',
  'Hat',
  'Earrings',
  'Ring',
  'Pendant',
  'Weapon',
  'Secondary Weapon',
  'Chair',
  'Pet',
  'Pet Equip',
  'Coupon',
  'Service',
  'Convenience',
  'Other',
];

const API_BASE = 'https://maplestory.io/api/GMS/latest';
let storage = [];
let pendingItem = null;
let selectedClass = null;
let searchTimer = null;
let currentQuery = '';

// ─── STORAGE PERSISTENCE ────────────────────────────────────────────────────
function loadStorage() {
  try {
    const raw = localStorage.getItem('maplestorage_v2');
    storage = raw ? JSON.parse(raw) : [];
  } catch { storage = []; }
}

function saveStorage() {
  try { localStorage.setItem('maplestorage_v2', JSON.stringify(storage)); } catch {}
}

function updateStats() {
  const total = storage.reduce((sum, i) => sum + (i.qty || 1), 0);
  document.getElementById('total-count').textContent = total;
}

// ─── ICON HELPERS ────────────────────────────────────────────────────────────
function iconUrl(id) { return `${API_BASE}/item/${id}/icon`; }

function iconHTML(item, size = 40, imgSize = 32) {
  const src = item.iconUrl || iconUrl(item.id || item.itemId);
  return `<div class="item-icon-wrap" style="width:${size}px;height:${size}px">
    <img src="${src}" width="${imgSize}" height="${imgSize}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">
    <span class="fallback" style="display:none">🍁</span>
  </div>`;
}

// ─── CLASS BADGE ─────────────────────────────────────────────────────────────
function classBadgeHTML(classId) {
  const cls = CLASSES.find(c => c.id === classId);
  if (!cls) return '';
  const chars = cls.chars.map(ch => `<span class="popover-char">${ch}</span>`).join('');
  return `<div class="class-badge-wrap">
    <div class="class-badge" style="color:${cls.color};background:${cls.bg};border-color:${cls.color}33">
      <span class="badge-dot" style="background:${cls.color}"></span>${cls.name}
    </div>
    <div class="class-popover">
      <div class="popover-title">Characters in this storage</div>
      <div class="popover-chars">${chars}</div>
    </div>
  </div>`;
}

// ─── CLASS BUTTON (modal) ────────────────────────────────────────────────────
function classBtnHTML(cls, isSelected) {
  const chars = cls.chars.map(ch => `<span class="btn-popover-char">${ch}</span>`).join('');
  const sel = isSelected
    ? `border-color:${cls.color};background:${cls.bg};color:${cls.color};font-weight:600`
    : '';
  return `<button class="class-btn" id="cbtn-${cls.id}" onclick="selectClass('${cls.id}')" style="${sel}">
    ${cls.name}
    <div class="btn-popover">
      <div class="btn-popover-title">Characters</div>
      <div class="btn-popover-chars">${chars}</div>
    </div>
  </button>`;
}

// ─── CATEGORY NORMALISER ─────────────────────────────────────────────────────
function normaliseCategory(item) {
  const sub = item.typeInfo?.subCategory || '';
  const cat = item.typeInfo?.category || '';
  const overall = item.overallCategory || item.itemCategory || '';

  const s = sub.toLowerCase();
  const c = cat.toLowerCase();

  if (s.includes('eye')) return 'Eye Decoration';
  if (s.includes('face')) return 'Face Decoration';
  if (s.includes('hair')) return 'Hair';
  if (s.includes('overall')) return 'Overall';
  if (s.includes('top') || c.includes('top')) return 'Top';
  if (s.includes('bottom')) return 'Bottom';
  if (s.includes('cape')) return 'Cape';
  if (s.includes('glove')) return 'Gloves';
  if (s.includes('shoe') || s.includes('boot')) return 'Shoes';
  if (s.includes('hat') || s.includes('helm') || s.includes('cap')) return 'Hat';
  if (s.includes('earring')) return 'Earrings';
  if (s.includes('ring')) return 'Ring';
  if (s.includes('pendant')) return 'Pendant';
  if (s.includes('weapon') && s.includes('secondary')) return 'Secondary Weapon';
  if (s.includes('weapon') || c.includes('weapon')) return 'Weapon';
  if (s.includes('chair')) return 'Chair';
  if (s.includes('pet equip')) return 'Pet Equip';
  if (s.includes('pet')) return 'Pet';
  if (s.includes('coupon')) return 'Coupon';
  if (s.includes('service')) return 'Service';
  if (s.includes('convenience') || s.includes('teleport')) return 'Convenience';

  // fallback to stored category string
  if (item.itemCategory) return item.itemCategory;
  return 'Other';
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
function onSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('db-search').value.trim();
  if (!q) { resetSearch(); return; }
  searchTimer = setTimeout(() => doSearch(q), 400);
}

function resetSearch() {
  document.getElementById('db-results').style.display = 'none';
  document.getElementById('db-empty').style.display = 'block';
  document.getElementById('db-result-count').textContent = '';
  document.getElementById('api-error').style.display = 'none';
  document.getElementById('spinner').classList.remove('show');
}

async function doSearch(q) {
  currentQuery = q;
  document.getElementById('spinner').classList.add('show');
  document.getElementById('api-error').style.display = 'none';
  document.getElementById('db-result-count').textContent = 'Searching…';

  try {
    const url = `${API_BASE}/item?overallCategory=Cash&name=${encodeURIComponent(q)}&count=25`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API returned ${res.status}`);
    const data = await res.json();
    if (currentQuery !== q) return;
    document.getElementById('spinner').classList.remove('show');
    const items = Array.isArray(data) ? data : (data.items || []);
    renderResults(items, q);
  } catch (err) {
    if (currentQuery !== q) return;
    document.getElementById('spinner').classList.remove('show');
    document.getElementById('api-error').style.display = 'block';
    document.getElementById('api-error').textContent =
      `⚠ Could not reach maplestory.io — check your connection. (${err.message})`;
    document.getElementById('db-result-count').textContent = '';
    document.getElementById('db-results').style.display = 'none';
    document.getElementById('db-empty').style.display = 'none';
  }
}

function renderResults(items, q) {
  const container = document.getElementById('db-results');
  const empty = document.getElementById('db-empty');
  const countEl = document.getElementById('db-result-count');

  if (!items.length) {
    container.style.display = 'none';
    empty.style.display = 'block';
    empty.innerHTML = `<div class="db-empty-icon">🔍</div>No cash items found for "<strong>${q}</strong>".`;
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${items.length} item${items.length !== 1 ? 's' : ''} found`;
  container.style.display = 'block';
  empty.style.display = 'none';

  container.innerHTML = `<div class="db-header">
    <span>Live Results — maplestory.io</span>
    <span class="api-badge">Live API</span>
  </div>` + items.map(item => {
    const id = item.id || item.itemId;
    const name = item.name || item.description?.name || 'Unknown Item';
    const category = normaliseCategory(item);
    const owned = storage.find(s => s.itemId === id);

    return `<div class="db-item">
      ${iconHTML({ id, iconUrl: iconUrl(id) })}
      <div class="item-info">
        <div class="item-name">${name}</div>
        <div class="item-id">#${id} &nbsp;·&nbsp; <span style="color:var(--text-dim)">${category}</span></div>
        ${owned ? `<div style="margin-top:3px">${classBadgeHTML(owned.classId)}</div>` : ''}
      </div>
      ${owned
        ? `<div class="add-btn owned">✓ Stored ×${owned.qty || 1}</div>`
        : `<button class="add-btn" onclick='openModal(${JSON.stringify({ id, name, category, iconUrl: iconUrl(id) })})'>+ Add</button>`
      }
    </div>`;
  }).join('');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(item) {
  pendingItem = item;
  selectedClass = null;

  document.getElementById('modal-item-preview').innerHTML =
    `${iconHTML(item, 40, 32)}
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      <div class="item-id">#${item.id} · ${item.category}</div>
    </div>`;

  document.getElementById('qty-input').value = 1;
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('class-grid').innerHTML = CLASSES.map(cls => classBtnHTML(cls, false)).join('');
  document.getElementById('modal').classList.add('open');
}

function selectClass(classId) {
  selectedClass = classId;
  document.getElementById('class-grid').innerHTML = CLASSES.map(cls => classBtnHTML(cls, cls.id === classId)).join('');
  document.getElementById('btn-confirm').disabled = false;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  pendingItem = null;
  selectedClass = null;
}

function changeQty(delta) {
  const input = document.getElementById('qty-input');
  const val = Math.max(1, Math.min(999, (parseInt(input.value) || 1) + delta));
  input.value = val;
}

function clampQty() {
  const input = document.getElementById('qty-input');
  const val = parseInt(input.value);
  if (isNaN(val) || val < 1) input.value = 1;
  if (val > 999) input.value = 999;
}

function confirmAdd() {
  if (!pendingItem || !selectedClass) return;
  const cls = CLASSES.find(c => c.id === selectedClass);
  const qty = Math.max(1, parseInt(document.getElementById('qty-input').value) || 1);

  // If already exists, update qty and class
  const existing = storage.find(s => s.itemId === pendingItem.id);
  if (existing) {
    existing.qty = (existing.qty || 1) + qty;
    existing.classId = selectedClass;
    showToast(`Updated — now ×${existing.qty} in ${cls.name}`, 'success');
  } else {
    storage.push({
      itemId: pendingItem.id,
      itemName: pendingItem.name,
      itemCategory: pendingItem.category,
      iconUrl: pendingItem.iconUrl,
      classId: selectedClass,
      qty,
      addedAt: Date.now(),
    });
    showToast(`Added ×${qty} to ${cls.name} storage`, 'success');
  }

  saveStorage();
  updateStats();
  closeModal();

  const q = document.getElementById('db-search').value.trim();
  if (q) doSearch(q);
  populateClassFilter();
}

// ─── STORAGE VIEW ────────────────────────────────────────────────────────────
function renderStorage() {
  const q = document.getElementById('storage-search').value.trim().toLowerCase();
  const cf = document.getElementById('storage-class-filter').value;
  const list = document.getElementById('storage-list');

  let items = [...storage];
  if (q) items = items.filter(i => i.itemName.toLowerCase().includes(q) || String(i.itemId).includes(q));
  if (cf) items = items.filter(i => i.classId === cf);

  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <p>${storage.length === 0
        ? 'Your storage is empty. Add items from the Add Items tab.'
        : 'No items match your search.'}</p>
    </div>`;
    return;
  }

  // Group by category
  const grouped = {};
  for (const item of items) {
    const cat = item.itemCategory || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  }

  // Sort categories by our defined order, unknowns go to end
  const sortedCats = Object.keys(grouped).sort((a, b) => {
    const ai = CATEGORY_ORDER.indexOf(a);
    const bi = CATEGORY_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  list.innerHTML = sortedCats.map(cat => {
    const catItems = grouped[cat];
    const rows = catItems.map(item => {
      const qtyBadge = `<span class="item-qty-badge ${(item.qty || 1) > 1 ? 'multi' : ''}">×${item.qty || 1}</span>`;
      return `<div class="storage-item">
        ${iconHTML(item)}
        <div class="item-info">
          <div class="item-name">${item.itemName}</div>
          <div class="item-id">#${item.itemId}</div>
        </div>
        ${qtyBadge}
        ${classBadgeHTML(item.classId)}
        <button class="remove-btn" onclick="removeItem(${item.itemId})" title="Remove">✕</button>
      </div>`;
    }).join('');

    return `<div class="storage-category-group">
      <div class="storage-category-header">
        <span class="storage-category-name">${cat}</span>
        <span class="storage-category-count">${catItems.length}</span>
      </div>
      <div class="storage-items-list">${rows}</div>
    </div>`;
  }).join('');
}

function removeItem(itemId) {
  storage = storage.filter(i => i.itemId !== itemId);
  saveStorage();
  updateStats();
  renderStorage();
  populateClassFilter();
  showToast('Item removed');
}

function populateClassFilter() {
  const sel = document.getElementById('storage-class-filter');
  const cur = sel.value;
  const used = new Set(storage.map(i => i.classId));
  sel.innerHTML = '<option value="">All storages</option>' +
    CLASSES.filter(c => used.has(c.id))
      .map(c => `<option value="${c.id}" ${cur === c.id ? 'selected' : ''}>${c.name}</option>`)
      .join('');
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
  document.getElementById('tab-storage').style.display = tab === 'storage' ? 'block' : 'none';
  document.getElementById('tab-sim').style.display = tab === 'sim' ? 'block' : 'none';
  const tabs = ['add', 'storage', 'sim'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabs[i] === tab));
  if (tab === 'storage') { populateClassFilter(); renderStorage(); }
  if (tab === 'sim') { renderSimSlots(); }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── MODAL CLOSE ON BACKDROP ─────────────────────────────────────────────────
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
loadStorage();
updateStats();
renderSimSlots();

// ─── SIM ─────────────────────────────────────────────────────────────────────

// Slot definitions: label, category matcher, default item ID (base body parts)
const SIM_SLOTS = [
  { id: 'Face',      label: 'Face',       cats: ['face decoration','face acc'],       default: 20000 },
  { id: 'Eye',       label: 'Eye Dec.',   cats: ['eye decoration','eye acc'],          default: 30000 },
  { id: 'Hat',       label: 'Hat',        cats: ['hat','helm','cap'],                  default: null  },
  { id: 'Top',       label: 'Top',        cats: ['top','shirt','coat'],                default: null  },
  { id: 'Bottom',    label: 'Bottom',     cats: ['bottom','pants'],                    default: null  },
  { id: 'Overall',   label: 'Overall',    cats: ['overall'],                           default: null  },
  { id: 'Shoes',     label: 'Shoes',      cats: ['shoe','boot'],                       default: null  },
  { id: 'Gloves',    label: 'Gloves',     cats: ['glove'],                             default: null  },
  { id: 'Cape',      label: 'Cape',       cats: ['cape'],                              default: null  },
  { id: 'Weapon',    label: 'Weapon',     cats: ['weapon'],                            default: null  },
  { id: 'Earring',   label: 'Earrings',   cats: ['earring'],                           default: null  },
];

// Default hair and body IDs by skin tone
const SKIN_HAIR_DEFAULTS = {
  '2000': { body: 2000, head: 12000, hair: 30030, face: 20000 },
  '2004': { body: 2004, head: 12004, hair: 30030, face: 20000 },
  '2010': { body: 2010, head: 12010, hair: 30030, face: 20000 },
  '2001': { body: 2001, head: 12001, hair: 30030, face: 20000 },
};

let simEquipped = {}; // slotId → { id, name, iconUrl }
let simSearchTimer = null;

function slotForItem(item) {
  const sub = (item.typeInfo?.subCategory || item.itemCategory || '').toLowerCase();
  const cat = (item.typeInfo?.category || '').toLowerCase();
  const combined = sub + ' ' + cat;
  for (const slot of SIM_SLOTS) {
    if (slot.cats.some(c => combined.includes(c))) return slot.id;
  }
  return null;
}

function updateCharacter() {
  const skin = document.getElementById('sim-skin').value;
  const stance = document.getElementById('sim-stance').value;
  const animated = document.getElementById('sim-animated').checked;
  const defaults = SKIN_HAIR_DEFAULTS[skin] || SKIN_HAIR_DEFAULTS['2000'];

  // Build item ID list: always include body, head, hair, face defaults + equipped items
  const ids = [defaults.body, defaults.head, defaults.hair, defaults.face];
  for (const slot of SIM_SLOTS) {
    const eq = simEquipped[slot.id];
    if (eq) ids.push(eq.id);
    else if (slot.default) ids.push(slot.default);
  }

  const idStr = ids.join(',');
  const ext = animated ? 'animated' : '0';
  const url = `${API_BASE}/character/${idStr}/${stance}/${ext}`;

  const img = document.getElementById('sim-character-img');
  const placeholder = document.getElementById('sim-character-placeholder');

  // Show loading spinner overlay
  const wrap = document.querySelector('.sim-character-wrap');
  let overlay = wrap.querySelector('.sim-loading-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'sim-loading-overlay';
    overlay.innerHTML = '<div class="spinner show" style="position:static;transform:none;"></div>';
    wrap.appendChild(overlay);
  }
  overlay.style.display = 'flex';

  img.onload = () => {
    overlay.style.display = 'none';
    img.style.display = 'block';
    placeholder.style.display = 'none';
  };
  img.onerror = () => {
    overlay.style.display = 'none';
  };
  img.src = url;
}

function renderSimSlots() {
  const grid = document.getElementById('sim-slots-grid');
  grid.innerHTML = SIM_SLOTS.map(slot => {
    const eq = simEquipped[slot.id];
    return `<div class="sim-slot ${eq ? 'has-item' : ''}" id="simslot-${slot.id}">
      <span class="sim-slot-label">${slot.label}</span>
      ${eq
        ? `<div class="sim-slot-item">
            ${iconHTML({ id: eq.id, iconUrl: eq.iconUrl }, 28, 22)}
            <span class="sim-slot-name">${eq.name}</span>
          </div>
          <button class="sim-unequip-btn" onclick="unequipSlot('${slot.id}')" title="Remove">✕</button>`
        : `<span class="sim-slot-empty">— empty —</span>`
      }
    </div>`;
  }).join('');
}

function equipItem(item) {
  const slotId = item.slotId || slotForItem(item);
  if (!slotId) {
    showToast('Item type not supported for sim', 'error');
    return;
  }
  simEquipped[slotId] = { id: item.id, name: item.name, iconUrl: item.iconUrl || iconUrl(item.id) };
  renderSimSlots();
  updateCharacter();
  // Clear search
  document.getElementById('sim-search').value = '';
  document.getElementById('sim-search-results').style.display = 'none';
}

function unequipSlot(slotId) {
  delete simEquipped[slotId];
  renderSimSlots();
  if (Object.keys(simEquipped).length > 0) {
    updateCharacter();
  } else {
    // No items equipped — reset preview
    const img = document.getElementById('sim-character-img');
    img.style.display = 'none';
    document.getElementById('sim-character-placeholder').style.display = 'block';
  }
}

function clearSim() {
  simEquipped = {};
  renderSimSlots();
  const img = document.getElementById('sim-character-img');
  img.style.display = 'none';
  document.getElementById('sim-character-placeholder').style.display = 'block';
}

// Sim search
function onSimSearchInput() {
  clearTimeout(simSearchTimer);
  const q = document.getElementById('sim-search').value.trim();
  if (!q) { document.getElementById('sim-search-results').style.display = 'none'; return; }
  simSearchTimer = setTimeout(() => doSimSearch(q), 400);
}

async function doSimSearch(q) {
  document.getElementById('sim-spinner').classList.add('show');
  try {
    const url = `${API_BASE}/item?overallCategory=Cash&name=${encodeURIComponent(q)}&count=15`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    document.getElementById('sim-spinner').classList.remove('show');
    const items = Array.isArray(data) ? data : (data.items || []);
    renderSimResults(items);
  } catch {
    document.getElementById('sim-spinner').classList.remove('show');
  }
}

function renderSimResults(items) {
  const container = document.getElementById('sim-search-results');
  if (!items.length) { container.style.display = 'none'; return; }

  container.style.display = 'block';
  container.innerHTML = items.map(item => {
    const id = item.id || item.itemId;
    const name = item.name || 'Unknown';
    const slotId = slotForItem(item);
    const category = normaliseCategory(item);
    const iUrl = iconUrl(id);
    const itemData = JSON.stringify({ id, name, iconUrl: iUrl, slotId, typeInfo: item.typeInfo, itemCategory: category });
    return `<div class="sim-result-item">
      ${iconHTML({ id, iconUrl: iUrl }, 32, 26)}
      <div>
        <div class="sim-result-name">${name}</div>
        <div class="sim-result-meta">#${id} · ${category}</div>
      </div>
      ${slotId
        ? `<button class="sim-equip-btn" onclick='equipItem(${itemData})'>Equip</button>`
        : `<span style="font-size:0.7rem;color:var(--text-dim);margin-left:auto">Not wearable</span>`
      }
    </div>`;
  }).join('');
}

// Also expose equipFromStorage — equip any item directly from the storage tab
function equipFromStorage(item) {
  switchTab('sim');
  equipItem({
    id: item.itemId,
    name: item.itemName,
    iconUrl: item.iconUrl || iconUrl(item.itemId),
    itemCategory: item.itemCategory,
    slotId: null,
  });
}

</script>
</body>
</html>
